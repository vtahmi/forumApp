services:
  postgres:
    image: postgres:16
    container_name: forum_db_docker
    restart: always
    ports:
      - "5433:5432"  # външен 5433, вътрешен 5432
    environment:
      POSTGRES_DB: forum_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_forum_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: forum_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_forum_data:/data

  redis-insight:
    image: redis/redisinsight:latest
    container_name: forum_redis_insight
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  postgres_forum_data:
  redis_forum_data: